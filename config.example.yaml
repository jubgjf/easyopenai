logging:
  stats_interval_s: 30
scheduler:
  max_retries_per_task: 3
  dispatch_policy: greedy   # greedy | round_robin
providers:
  - name: bltcy
    base_url: https://api.bltcy.ai/v1
    api_key: ${BLTCY_API_KEY}
    max_concurrency: 4              # provider 级默认并发数
    max_rpm: 60                     # provider 级默认 RPM
    force_stream: true              # provider 级默认流式策略
    health:
      window_size: 20
      failure_threshold: 0.5
      cooldown_s: 30
    models:
      - name: qwen3-8b
        is_reasoning: true
        # 未设 force_stream / max_concurrency / max_rpm → 继承 provider 级
      - name: deepseek-r1
        is_reasoning: true
        force_stream: false         # 该模型覆盖为非流式
        max_concurrency: 2          # 该模型独立并发上限
        max_rpm: 30                 # 该模型独立 RPM

  - name: yunwu
    base_url: https://yunwu.ai/v1
    api_key: ${YUNWU_API_KEY}
    max_concurrency: 4
    max_rpm: 60
    force_stream: false
    health:
      window_size: 20
      failure_threshold: 0.5
      cooldown_s: 30
    models:
      - name: qwen3-8b
        is_reasoning: true
      - name: deepseek-r1
        is_reasoning: true
